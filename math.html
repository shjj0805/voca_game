<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>몬스터 수학 대모험</title>
<style>
  :root{
    --ink:#2b2350;
    --sun:#ffd23f; --coral:#ff6b9d; --mint:#4fd1a5;
    --shadow: 0 8px 0 rgba(43,35,80,.18);
    --font: "Pretendard","Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",system-ui,sans-serif;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; }
  body{
    font-family:var(--font); color:var(--ink);
    background:
      radial-gradient(circle at 18% 10%, rgba(255,255,255,.30), transparent 40%),
      radial-gradient(circle at 85% 6%, rgba(255,210,63,.28), transparent 38%),
      linear-gradient(160deg,#8a6cf0,#5b3fb0);
    background-attachment:fixed; min-height:100dvh; overflow-x:hidden; user-select:none;
  }
  .bg-star{ position:fixed; color:rgba(255,255,255,.5); pointer-events:none; z-index:0; animation:tw 3s ease-in-out infinite; }
  @keyframes tw{ 0%,100%{opacity:.25;transform:scale(.8);} 50%{opacity:.9;transform:scale(1.15);} }

  .app{ position:relative; z-index:1; max-width:560px; margin:0 auto; min-height:100dvh; display:flex; flex-direction:column; padding:12px 16px 26px; }

  .topbar{ display:flex; align-items:center; gap:8px; margin-bottom:8px; height:46px; }
  .pill{ background:rgba(255,255,255,.92); border-radius:999px; padding:8px 13px; font-weight:800; font-size:15px; box-shadow:var(--shadow); display:flex; align-items:center; gap:5px; }
  .spacer{ flex:1; }
  .iconbtn{ border:none; background:rgba(255,255,255,.92); width:46px; height:46px; border-radius:16px; font-size:22px; box-shadow:var(--shadow); cursor:pointer; transition:transform .08s; }
  .iconbtn:active{ transform:translateY(3px); box-shadow:0 4px 0 rgba(43,35,80,.18); }

  .screen{ display:none; flex:1; flex-direction:column; }
  .screen.active{ display:flex; animation:pop .35s cubic-bezier(.2,1.3,.5,1); }
  @keyframes pop{ from{opacity:0;transform:scale(.94) translateY(10px);} to{opacity:1;transform:none;} }
  @keyframes bob{ 0%,100%{transform:translateY(0) rotate(-2deg);} 50%{transform:translateY(-12px) rotate(2deg);} }

  /* TITLE */
  #title{ align-items:center; justify-content:center; text-align:center; gap:8px; }
  .logo{ font-size:clamp(38px,11vw,60px); font-weight:900; line-height:1.02; letter-spacing:-1px; color:#fff; text-shadow:0 5px 0 #3a2a8a,0 6px 14px rgba(0,0,0,.25); }
  .logo .hl{ color:var(--sun); display:inline-block; transform:rotate(-4deg); }
  .subtitle{ color:#fff; font-weight:800; font-size:16px; opacity:.95; }
  .title-monster{ width:168px; height:168px; margin:6px 0; animation:bob 2.4s ease-in-out infinite; }
  .bigbtn{ border:none; cursor:pointer; font-family:var(--font); font-weight:900; color:#fff; font-size:23px; padding:17px 28px; border-radius:22px; width:100%; max-width:320px; background:linear-gradient(180deg,#ff87b4,#ff4f8b); box-shadow:0 8px 0 #c72e63,0 12px 18px rgba(0,0,0,.2); transition:transform .08s,box-shadow .08s; }
  .bigbtn:active{ transform:translateY(6px); box-shadow:0 2px 0 #c72e63; }
  .bigbtn.green{ background:linear-gradient(180deg,#6ce0b0,#28b483); box-shadow:0 8px 0 #1a8a63,0 12px 18px rgba(0,0,0,.2); }
  .bigbtn.green:active{ box-shadow:0 2px 0 #1a8a63; }

  .screen-title{ color:#fff; font-weight:900; font-size:24px; text-align:center; margin:2px 0 12px; text-shadow:0 3px 0 rgba(43,35,80,.35); }

  /* MAP */
  .regions{ display:grid; gap:14px; }
  .region{ position:relative; border:none; cursor:pointer; text-align:left; font-family:var(--font); border-radius:24px; padding:18px; color:#fff; overflow:hidden; box-shadow:0 8px 0 rgba(0,0,0,.18); transition:transform .1s,box-shadow .1s; min-height:104px; }
  .region:active{ transform:translateY(5px); box-shadow:0 3px 0 rgba(0,0,0,.18); }
  .region .rname{ font-size:22px; font-weight:900; text-shadow:0 2px 0 rgba(0,0,0,.2); }
  .region .rprog{ font-weight:800; font-size:14px; opacity:.95; margin-top:3px; }
  .region .rbar{ height:9px; border-radius:99px; background:rgba(255,255,255,.35); margin-top:9px; overflow:hidden; max-width:190px; }
  .region .rbar>i{ display:block; height:100%; background:#fff; border-radius:99px; }
  .region .remoji{ position:absolute; right:12px; bottom:-6px; font-size:70px; opacity:.9; filter:drop-shadow(0 4px 6px rgba(0,0,0,.2)); }
  .region .rmini{ position:absolute; right:74px; bottom:10px; width:54px; height:54px; filter:drop-shadow(0 4px 4px rgba(0,0,0,.25)); }
  .region.clear::after{ content:"✓"; position:absolute; top:12px; right:14px; background:rgba(255,255,255,.95); color:#28b483; font-weight:900; font-size:15px; width:26px; height:26px; border-radius:50%; text-align:center; line-height:26px; }
  .region.locked{ filter:grayscale(.65) brightness(.85); cursor:not-allowed; }
  .region.locked .lock{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:42px; background:rgba(40,30,70,.35); }
  .r-forest{ background:linear-gradient(140deg,#8fd44a,#3f9e2f); box-shadow:0 8px 0 #2c6f20; }
  .r-sea{ background:linear-gradient(140deg,#54b8f5,#2f6fd8); box-shadow:0 8px 0 #1f4fa0; }
  .r-volcano{ background:linear-gradient(140deg,#ff8a4c,#e0402f); box-shadow:0 8px 0 #a02618; }
  .r-star{ background:linear-gradient(140deg,#b07cf0,#6b3fc8); box-shadow:0 8px 0 #4a2a94; }
  .r-rainbow{ background:linear-gradient(120deg,#ff8fb0,#ffd23f 28%,#7ae0a0 52%,#5cc8f0 74%,#b08cf0); box-shadow:0 8px 0 #7a5ca0; }

  /* JOURNEY (path) */
  .jhead{ display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .jhead .jtitle{ color:#fff; font-weight:900; font-size:19px; text-shadow:0 2px 0 rgba(43,35,80,.35); }
  .jhead .jprog{ color:#fff; font-weight:800; font-size:14px; background:rgba(255,255,255,.2); padding:5px 10px; border-radius:99px; }
  .trailwrap{ border-radius:22px; overflow:hidden; box-shadow:0 8px 0 rgba(0,0,0,.18), inset 0 0 0 4px rgba(255,255,255,.15); }
  .scene{ position:relative; width:100%; }
  .scene>svg.bg{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  .pin{ position:absolute; transform:translate(-50%,-50%); border:none; background:none; cursor:pointer; padding:0; z-index:2; }
  .pin.locked{ cursor:default; }
  .disc{ position:relative; width:62px; height:62px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 38% 30%, #eef1f4, #b3b9c1 58%, #868d96);
    border:3px solid #6b727b; box-shadow: inset 0 -6px 9px rgba(0,0,0,.35), inset 0 4px 7px rgba(255,255,255,.65), 0 6px 9px rgba(0,0,0,.4); }
  .disc .qm{ font-size:32px; font-weight:900; color:#565b63; text-shadow:0 2px 0 rgba(255,255,255,.55); }
  .disc svg{ width:52px; height:52px; }
  .plaque{ position:absolute; bottom:-13px; left:50%; transform:translateX(-50%); background:#5a3d24; color:#ffedcf; font-weight:900; font-size:13px; line-height:1; padding:4px 9px; border-radius:8px; border:2px solid #3a2614; box-shadow:0 3px 0 rgba(0,0,0,.3); min-width:22px; text-align:center; }
  .pin.done .disc{ background:radial-gradient(circle at 38% 30%, #ffffff, #e4ebef 58%, #c2cad0); border-color:#9aa2ab; }
  .pin.current .disc{ box-shadow:0 0 0 5px var(--sun), inset 0 -6px 9px rgba(0,0,0,.35), 0 6px 12px rgba(0,0,0,.45); animation:bob 1.4s ease-in-out infinite; }
  .pin .flag{ position:absolute; bottom:64px; left:50%; transform:translateX(-50%); background:var(--coral); color:#fff; font-weight:900; font-size:12px; padding:3px 10px; border-radius:99px; white-space:nowrap; box-shadow:0 3px 0 rgba(0,0,0,.25); animation:bob 1.4s ease-in-out infinite; }
  .pin .flag::after{ content:""; position:absolute; bottom:-5px; left:50%; transform:translateX(-50%); border:5px solid transparent; border-top-color:var(--coral); }
  .pin .chk{ position:absolute; right:-6px; top:-6px; width:24px; height:24px; background:var(--mint); color:#fff; border-radius:50%; font-weight:900; font-size:14px; line-height:24px; text-align:center; box-shadow:0 2px 0 rgba(0,0,0,.2); z-index:3; }
  .pin.boss .disc{ width:82px; height:82px; border-color:#c79a20; box-shadow:0 0 0 4px #ffd23f, inset 0 -7px 11px rgba(0,0,0,.35), 0 7px 11px rgba(0,0,0,.45); }
  .pin.boss .disc svg{ width:66px; height:66px; }
  .pin.boss .disc .qm{ font-size:38px; }
  .pin.boss.current .disc{ animation:bob 1.3s ease-in-out infinite; }
  .pin.boss .plaque{ background:#7a5210; border-color:#4a3208; color:#fff3cf; }

  /* BATTLE */
  .t-forest{ background:linear-gradient(180deg,#bff08a,#6bb04a); }
  .t-sea{ background:linear-gradient(180deg,#a6dcff,#4f9fd8); }
  .t-volcano{ background:linear-gradient(180deg,#ffcf9a,#e88250); }
  .t-star{ background:linear-gradient(180deg,#c9b6ff,#7f5fd0); }
  .t-rainbow{ background:linear-gradient(180deg,#fff0f8,#dcc6ff); }
  #battle{ gap:8px; }
  .btop{ display:flex; align-items:center; gap:10px; min-height:44px; }
  .timerbar{ flex:1; height:16px; border-radius:99px; background:rgba(255,255,255,.35); overflow:hidden; box-shadow:inset 0 2px 4px rgba(0,0,0,.18); position:relative; }
  .timerbar>i{ display:block; height:100%; width:100%; background:linear-gradient(90deg,#7ee0b0,#28b483); border-radius:99px; }
  .timerbar.low>i{ background:linear-gradient(90deg,#ffb05c,#ff4f4f); animation:tpulse .5s ease-in-out infinite; }
  @keyframes tpulse{ 0%,100%{opacity:1;} 50%{opacity:.6;} }
  .timerbar .tsec{ position:absolute; right:10px; top:50%; transform:translateY(-50%); font-size:12px; font-weight:900; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.5); }
  .hp{ font-size:22px; letter-spacing:2px; text-align:center; min-height:26px; }
  .battle-monster.flee{ animation:flee .6s ease-in forwards; }
  @keyframes flee{ to{ transform:translateX(140px) rotate(20deg); opacity:0; } }
  .battle-stage{ position:relative; border-radius:26px; padding:14px; flex:1; display:flex; flex-direction:column; align-items:center; box-shadow:inset 0 -30px 40px rgba(0,0,0,.12),0 8px 0 rgba(0,0,0,.15); overflow:hidden; min-height:280px; }
  .bubble{ position:relative; background:#fff; border-radius:20px; padding:16px 18px; margin:2px 6px 6px; box-shadow:0 6px 0 rgba(0,0,0,.15); text-align:center; width:100%; }
  .bubble::after{ content:""; position:absolute; bottom:-13px; left:50%; transform:translateX(-50%); border:9px solid transparent; border-top-color:#fff; }
  .q-text{ font-size:clamp(19px,5.2vw,27px); font-weight:900; color:var(--ink); line-height:1.35; }
  .q-visual{ font-size:24px; line-height:1.55; margin-top:8px; word-break:break-word; }
  .q-visual .grp{ white-space:nowrap; } .q-visual .gsep{ opacity:.4; margin:0 3px; }
  .q-hint{ font-size:13px; font-weight:800; color:#8a7fb5; margin-top:6px; }
  .battle-monster{ width:132px; height:132px; margin-top:auto; animation:bob 2s ease-in-out infinite; filter:drop-shadow(0 8px 6px rgba(0,0,0,.25)); }
  .battle-monster.boss{ width:168px; height:168px; }
  .feedback{ text-align:center; font-weight:900; font-size:17px; color:#fff; min-height:22px; text-shadow:0 2px 0 rgba(43,35,80,.35); }
  .choices{ display:grid; grid-template-columns:1fr 1fr; gap:11px; }
  .choices.two{ grid-template-columns:1fr; }
  .choice{ border:none; cursor:pointer; font-family:var(--font); font-weight:900; font-size:28px; color:var(--ink); background:#fff; border-radius:18px; padding:18px 8px; box-shadow:0 6px 0 rgba(43,35,80,.22); transition:transform .08s,box-shadow .08s; }
  .choices.two .choice{ font-size:26px; padding:16px 8px; }
  .choice:active{ transform:translateY(4px); box-shadow:0 2px 0 rgba(43,35,80,.22); }
  .choice.wrong{ background:#ffd6d6; color:#c33; box-shadow:0 6px 0 #d88; animation:shake .35s; }
  .choice.right{ background:#c9f7dd; color:#1a8a63; box-shadow:0 6px 0 #57c894; }
  @keyframes shake{ 0%,100%{transform:translateX(0);}20%{transform:translateX(-7px);}40%{transform:translateX(7px);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);} }

  /* DEX */
  .dexregion{ color:#fff; font-weight:900; font-size:16px; margin:14px 2px 8px; text-shadow:0 2px 0 rgba(43,35,80,.3); }
  .dexgrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .dexcard{ background:rgba(255,255,255,.94); border-radius:16px; padding:8px 4px 8px; text-align:center; box-shadow:var(--shadow); }
  .dexcard svg{ width:62px; height:62px; }
  .dexname{ font-weight:900; font-size:12px; margin-top:2px; color:var(--ink); }
  .dexname.locked{ color:#b6afd0; }
  .dexname.boss{ color:#e0902f; }

  /* OVERLAYS */
  .overlay{ position:fixed; inset:0; z-index:40; display:none; align-items:center; justify-content:center; background:rgba(30,20,60,.55); backdrop-filter:blur(3px); padding:24px; text-align:center; flex-direction:column; }
  .overlay.show{ display:flex; animation:pop .3s; }
  .catch-wrap{ position:relative; width:170px; height:170px; }
  .catch-monster{ width:150px; height:150px; }
  .ball{ position:absolute; left:50%; top:50%; width:80px; height:80px; transform:translate(-50%,-50%); }
  .catch-title{ color:#fff; font-size:32px; font-weight:900; margin-top:8px; text-shadow:0 4px 0 #3a2a8a; }
  .catch-sub{ color:#ffe9a8; font-weight:800; font-size:17px; margin-top:2px; }
  .sparkle{ position:absolute; font-size:26px; animation:spark .9s ease-out forwards; }
  @keyframes spark{ 0%{opacity:0;transform:scale(.3);} 40%{opacity:1;} 100%{opacity:0;transform:scale(1.4) translateY(-30px);} }
  .clear-emoji{ font-size:70px; animation:bob 1.6s ease-in-out infinite; }
  .confetti{ position:fixed; top:-20px; width:12px; height:16px; z-index:45; border-radius:2px; }
  @media (prefers-reduced-motion: reduce){ *{ animation-duration:.001s !important; } }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="iconbtn" id="homeBtn" title="처음으로" style="display:none">🏠</button>
    <div class="pill">⭐ <span id="starCount">0</span></div>
    <div class="pill">📖 <span id="dexCount">0</span>/<span id="dexTotal">0</span></div>
    <div class="spacer"></div>
    <button class="iconbtn" id="muteBtn" title="소리">🔊</button>
  </div>

  <!-- TITLE -->
  <section class="screen active" id="title">
    <div class="logo">몬스터 <span class="hl">수학</span><br>대모험</div>
    <div class="subtitle">길을 따라 걸으며 몬스터를 잡아라!</div>
    <div class="title-monster" id="titleMonster"></div>
    <button class="bigbtn" id="startBtn">🎮 모험 시작</button>
    <button class="bigbtn green" id="dexBtn">📖 몬스터 도감</button>
  </section>

  <!-- MAP -->
  <section class="screen" id="map">
    <div class="screen-title">어느 지역으로 떠날까?</div>
    <div class="regions" id="regions"></div>
  </section>

  <!-- JOURNEY -->
  <section class="screen" id="journey">
    <div class="jhead">
      <button class="iconbtn" id="jBack">🗺️</button>
      <div class="jtitle" id="jTitle"></div>
      <div class="spacer"></div>
      <div class="jprog" id="jProg"></div>
    </div>
    <div class="trailwrap" id="trailwrap">
      <div class="trail" id="trail"></div>
    </div>
  </section>

  <!-- BATTLE -->
  <section class="screen" id="battle">
    <div class="btop">
      <button class="iconbtn" id="bBack">↩️</button>
      <div class="timerbar" id="timerbar"><i id="timerFill"></i><span class="tsec" id="tsec"></span></div>
    </div>
    <div class="hp" id="hp"></div>
    <div class="battle-stage" id="stage">
      <div class="bubble">
        <div class="q-text" id="qText"></div>
        <div class="q-visual" id="qVisual"></div>
        <div class="q-hint" id="qHint"></div>
      </div>
      <div class="battle-monster" id="battleMonster"></div>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="choices" id="choices"></div>
  </section>

  <!-- DEX -->
  <section class="screen" id="dex">
    <div class="screen-title">몬스터 도감</div>
    <div id="dexBody"></div>
  </section>
</div>

<div class="overlay" id="catchOverlay">
  <div class="catch-wrap" id="catchWrap"></div>
  <div class="catch-title" id="catchTitle">잡았다!</div>
  <div class="catch-sub" id="catchSub"></div>
</div>
<div class="overlay" id="clearOverlay">
  <div class="clear-emoji" id="clearEmoji">🎉</div>
  <div class="catch-title">지역 완료!</div>
  <div class="catch-sub" id="clearSub"></div>
  <button class="bigbtn" id="clearNext" style="margin-top:18px;max-width:260px">지도로 가기 ➜</button>
</div>

<script>
"use strict";

/* ---------- safe storage ---------- */
const mem={};
const store={ get(k){ try{return localStorage.getItem(k);}catch(e){return (k in mem)?mem[k]:null;} },
              set(k,v){ try{localStorage.setItem(k,v);}catch(e){mem[k]=v;} } };

/* ---------- helpers ---------- */
const $=id=>document.getElementById(id);
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick=a=>a[Math.floor(Math.random()*a.length)];
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};

/* ---------- color helpers ---------- */
function toRGB(h){h=h.replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function h2(x){x=Math.max(0,Math.min(255,Math.round(x))).toString(16);return x.length<2?'0'+x:x;}
function mix(a,b,t){const A=toRGB(a),B=toRGB(b);return'#'+A.map((v,i)=>h2(v+(B[i]-v)*t)).join('');}

/* ---------- regions & roster ---------- */
const REGIONS=[
  {id:'forest', name:'초록 숲',    emoji:'🌳', cls:'r-forest',  trail:'t-forest',  pal:['#7ac74c','#4ea86b','#8fd66a','#6faa5c','#a7cf5c','#5c9e4a']},
  {id:'sea',    name:'파도 바다',  emoji:'🌊', cls:'r-sea',     trail:'t-sea',     pal:['#4db6e8','#5c7cf0','#5fd6d0','#7ad0e8','#3fa8e0','#6ec0f0']},
  {id:'volcano',name:'불꽃 화산',  emoji:'🌋', cls:'r-volcano', trail:'t-volcano', pal:['#ff7a3c','#e8503c','#ffb03c','#ff9040','#d0603c','#ff6a50']},
  {id:'star',   name:'반짝 별나라',emoji:'⭐', cls:'r-star',    trail:'t-star',    pal:['#a86ce8','#c8a8f0','#6c7ce8','#f06ca8','#7a8cf0','#9fd4f0']},
  {id:'rainbow',name:'무지개 골짜기',emoji:'🌈',cls:'r-rainbow',trail:'t-rainbow', pal:['#ff8fb0','#8fd4f0','#ffd23f','#a8f0c8','#ff9ad0','#c88cf0']},
];
const FEATURES=['ears','horn','antenna','spikes','wings','fin','tuft','star'];
const NAMES={
  forest:['새싹이','도토리','이끼몽','버섯이','나뭇잎','부엉몽','다람이','딱따구','애벌레','나비잎','솔방울','고사리','청개굴','반딧불','들꽃이','담쟁이','두더지','밤톨이','고목왕'],
  sea:['물방울','파랑이','거품이','해파리','조개몽','문어돌','별불가','소라돌','새우돌','게발이','돌고래','미역이','진주알','물총이','파도돌','산호몽','가오리','복어돌','크라켄'],
  volcano:['불꽃이','용암몽','잿불이','마그마','숯덩이','폭죽이','불티몽','화산돌','도롱뇽','불도마','연기몽','불씨몽','화룡이','잉걸이','불나방','붉바위','불꽃새','화염구','용가리'],

/* ================= PROBLEM ENGINE ================= */
function mkChoices(ans,count){
  count=count||4; const spread=Math.max(3,Math.round(Math.abs(ans)*0.2));
  const set=new Set([ans]); let g=0;
  while(set.size<count){ let d=ans+rnd(-spread,spread); if(d>=0&&!set.has(d))set.add(d); if(++g>90){ let f=ans+set.size; set.add(f>=0?f:ans+set.size+5);} }
  return shuffle([...set]);
}
function groupsVisual(per,n,item){ let out=[]; for(let i=0;i<n;i++)out.push('<span class="grp">'+item.repeat(per)+'</span>'); return out.join('<span class="gsep">|</span>'); }

  mfac(c){ const a=pick(c.tables),q=rnd(2,9),p=a*q; return {text:`${a} × □ = ${p}`,hint:'□에 알맞은 수는?',answer:q,choices:mkChoices(q)}; },
  groups(c){ const per=pick([2,3,4,5,6]),n=rnd(2,5),ans=per*n,item=pick(['🍎','⭐','🍬','🐟','🌰']); return {text:`${per}개씩 ${n}묶음이면 모두 몇 개?`,visual:groupsVisual(per,n,item),hint:'묶어 세어 볼까?',answer:ans,choices:mkChoices(ans)}; },
  skip(c){ const step=pick(c.skipSteps),start=step*rnd(1,3),seq=[start,start+step,start+2*step,start+3*step],ans=seq[3]; return {text:seq.slice(0,3).join(', ')+', □',hint:`${step}씩 뛰어 세면?`,answer:ans,choices:mkChoices(ans)}; },
  seq(c){ const d=pick([2,3,4,5]),s=rnd(1,9),seq=[s,s+d,s+2*d,s+3*d]; const idx=Math.random()<0.7?3:rnd(1,2),ans=seq[idx]; return {text:seq.map((n,i)=>i===idx?'□':n).join(', '),hint:'규칙을 찾아 □를 채워봐!',answer:ans,choices:mkChoices(ans)}; },
  seqx(c){ const base=pick([2,3]),s=pick([1,2,3]),seq=[s,s*base,s*base*base,s*base*base*base],ans=seq[3]; return {text:seq.slice(0,3).join(', ')+', □',hint:'몇 배씩 커질까?',answer:ans,choices:mkChoices(ans)}; },
  share(c){ const per=rnd(2,6),fr=pick([2,3,4]),tot=per*fr,item=pick(['🍎','🍌','🍪','⭐','🍬','🍇']); return {text:`${tot}개를 ${fr}명이 똑같이 나누면?`,visual:item.repeat(tot)+'<br>'+'🧒'.repeat(fr),hint:'한 명은 몇 개?',answer:per,choices:mkChoices(per)}; },
  divw(c){ const g=pick([2,3,4,5,6]),n=rnd(2,6),tot=g*n,item=pick(['🍬','🍪','🍎','🐚']); return {text:`${item} ${tot}개를 ${g}개씩 담으면 몇 봉지?`,hint:'몇 묶음이 될까?',answer:n,choices:mkChoices(n)}; },
  add(c){ let a,b,k=0; do{ a=rnd(c.addMin,c.addMax); b=rnd(c.addMin,c.addMax);}while(a+b>c.maxSum&&++k<40); return {text:`${a} + ${b} = ?`,hint:'두 자리 덧셈',answer:a+b,choices:mkChoices(a+b)}; },
  sub(c){ const a=rnd(c.subMin,c.subMax),b=rnd(1,a-1); return {text:`${a} - ${b} = ?`,hint:'두 자리 뺄셈',answer:a-b,choices:mkChoices(a-b)}; },
  madd(c){ const ans=rnd(2,c.missMax),a=rnd(1,c.missMax),cc=a+ans; return {text:`${a} + □ = ${cc}`,hint:'□에 알맞은 수는?',answer:ans,choices:mkChoices(ans)}; },
  msub(c){ const cc=rnd(c.subMin,c.subMax),r=rnd(1,cc-1),ans=cc-r; return {text:`${cc} - □ = ${r}`,hint:'□에 알맞은 수는?',answer:ans,choices:mkChoices(ans)}; },
  three(c){ if(Math.random()<0.5){ const a=rnd(5,30),b=rnd(5,30),cc=rnd(1,Math.min(a+b,30)),ans=a+b-cc; return {text:`${a} + ${b} - ${cc} = ?`,hint:'앞에서부터 차근차근!',answer:ans,choices:mkChoices(ans)}; } const a=rnd(5,25),b=rnd(5,25),cc=rnd(1,20),ans=a+b+cc; if(ans>99)return GEN.three(c); return {text:`${a} + ${b} + ${cc} = ?`,hint:'앞에서부터 차근차근!',answer:ans,choices:mkChoices(ans)}; },
  wmul(c){ const per=pick(c.tables),n=rnd(2,6),ans=per*n,box=pick(['상자','바구니','접시','봉지']),thing=pick(['사과','연필','사탕','쿠키','구슬']); return {text:`${box} 하나에 ${thing} ${per}개씩 있어요. ${box} ${n}개에는 모두 몇 개?`,hint:'곱셈으로 생각해봐!',answer:ans,choices:mkChoices(ans)}; },
  cmp(c){ function ex(){ if(Math.random()<0.5){ const a=pick(c.tables),b=rnd(2,9); return {s:`${a}×${b}`,v:a*b}; } const a=rnd(12,49),b=rnd(12,49); return {s:`${a}+${b}`,v:a+b}; } let e1=ex(),e2=ex(),k=0; while(e1.v===e2.v&&++k<20)e2=ex(); if(e1.v===e2.v)e2={s:String(e1.v-3),v:e1.v-3}; const big=e1.v>e2.v?e1:e2; return {text:'어느 쪽이 더 클까?',twoOpt:true,hint:'더 큰 쪽을 골라봐!',answer:big.s,choices:shuffle([e1.s,e2.s])}; },
};

function star4(x,y,s,c){ return `<path transform="translate(${x.toFixed(0)} ${y.toFixed(0)}) scale(${s.toFixed(2)})" d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z" fill="${c}"/>`; }
function dot(x,y,r,c){ return `<circle cx="${x.toFixed(0)}" cy="${y.toFixed(0)}" r="${r}" fill="${c}"/>`; }
function bridge(x,y,ang){ return `<g transform="translate(${x.toFixed(0)} ${y.toFixed(0)}) rotate(${ang.toFixed(0)})"><rect x="-42" y="-22" width="84" height="6" rx="3" fill="#8a5e34"/><rect x="-40" y="-18" width="80" height="36" rx="5" fill="#b07f45" stroke="#7a5227" stroke-width="3"/><g stroke="#8a5e34" stroke-width="3">${[-28,-14,0,14,28].map(px=>`<line x1="${px}" y1="-18" x2="${px}" y2="18"/>`).join('')}</g><rect x="-42" y="16" width="84" height="6" rx="3" fill="#8a5e34"/></g>`; }
function woodSign(x,y,label,w){ w=w||140; return `<g transform="translate(${x.toFixed(0)} ${y.toFixed(0)})"><rect x="${-w/2+8}" y="30" width="11" height="52" fill="#6b4a2a"/><rect x="${w/2-19}" y="30" width="11" height="52" fill="#6b4a2a"/><rect x="${-w/2}" y="-4" width="${w}" height="46" rx="8" fill="#8a5e34" stroke="#5a3d22" stroke-width="4"/><rect x="${-w/2+5}" y="1" width="${w-10}" height="6" rx="3" fill="#a3703f"/><text x="0" y="30" font-size="26" font-weight="900" fill="#ffedcf" text-anchor="middle" font-family="sans-serif">${label}</text></g>`; }
function caveGoal(x,y){ return `<g transform="translate(${x.toFixed(0)} ${y.toFixed(0)})"><ellipse cx="0" cy="-6" rx="122" ry="98" fill="#615647"/><ellipse cx="0" cy="-6" rx="104" ry="82" fill="#4a4034"/><path d="M-70,42 Q-70,-72 0,-72 Q70,-72 70,42 Z" fill="#241f18"/><rect x="-30" y="-66" width="60" height="108" fill="#7fd4ef" opacity=".85"/><g stroke="#cdeeff" stroke-width="4" opacity=".8">${[-20,-6,8,22].map(px=>`<line x1="${px}" y1="-66" x2="${px}" y2="42"/>`).join('')}</g><ellipse cx="0" cy="46" rx="58" ry="12" fill="#8fdcf2" opacity=".7"/><g transform="translate(86 -38)"><rect x="-3" y="0" width="6" height="34" fill="#5a3d22"/><circle cx="0" cy="-4" r="10" fill="#ffb43c"/><circle cx="0" cy="-6" r="5" fill="#fff1a8"/></g></g>`; }
function goalMarker(rid,x,y){
  let e='';
  if(rid==='forest') e=caveGoal(x,y-6);
  else if(rid==='sea') e=`<g transform="translate(${x} ${y-24})"><rect x="-16" y="-64" width="32" height="92" rx="6" fill="#f4f4f4" stroke="#cfcfcf" stroke-width="3"/><rect x="-16" y="-34" width="32" height="16" fill="#ff5a5a"/><rect x="-16" y="2" width="32" height="16" fill="#ff5a5a"/><polygon points="0,-88 -22,-60 22,-60" fill="#ffce4a"/><circle cx="0" cy="-68" r="8" fill="#fff6c0"/></g>`;
  else if(rid==='volcano') e=`<g transform="translate(${x} ${y})"><polygon points="-92,44 0,-92 92,44" fill="#5a3226"/><polygon points="-30,-30 0,-92 30,-30" fill="#ff5a2a"/><ellipse cx="0" cy="-74" rx="34" ry="12" fill="#ffb03c"/><circle cx="-40" cy="-40" r="4" fill="#ffd23f"/><circle cx="34" cy="-30" r="3" fill="#ffd23f"/></g>`;
  else if(rid==='star') e=`<g transform="translate(${x} ${y})"><circle r="72" fill="none" stroke="#ffe36b" stroke-width="10" opacity=".85"/><circle r="52" fill="#3a2f7a" opacity=".7"/>${star4(0,0,3,'#fff2b0')}</g>`;
  else e=`<g transform="translate(${x} ${y+6})">${['#ff6b6b','#ffb04a','#ffe14a','#5ad06a','#5c9cff','#b06bff'].map((c,i)=>`<path d="M-118,44 A128,128 0 0 1 118,44" fill="none" stroke="${c}" stroke-width="11" transform="translate(0 ${i*13})"/>`).join('')}</g>`;
  return e+woodSign(x,y+72,'GOAL',128);
}
function scatter(rng,g,count,fn){ let s=''; for(let i=0;i<count;i++) s+=fn(rng()*g.W, rng()*g.H, rng()); return s; }
function decorBack(rid,rng,g){
  if(rid==='forest') return scatter(rng,g,Math.round(g.H/58),(x,y,r)=> r<0.55? pine(x,y,0.7+r*0.9, r<0.28?['#357e2c','#2a5f24']:['#66b84f','#4f9c3f']) : bush(x,y,0.8+r*0.4, r<0.8?['#5aa845','#3f8a34']:['#7cc65c','#5aa845']))
    + scatter(rng,g,Math.round(g.H/240),(x,y,r)=>`<g transform="translate(${x.toFixed(0)} ${y.toFixed(0)})"><circle r="3.4" fill="${['#ffd23f','#ff8fb0','#fff'][Math.floor(r*3)%3]}"/><circle r="1.4" fill="#ffcf3f"/></g>`);
  if(rid==='sea') return scatter(rng,g,Math.round(g.H/80),(x,y,r)=> r<0.5? rock(x,y,0.7+r,['#8aa0b0','#63788a']) : `<path transform="translate(${x.toFixed(0)} ${y.toFixed(0)})" d="M-14,0 q14,-9 28,0" stroke="#eafaff" stroke-width="3" fill="none" opacity=".7"/>`);
  if(rid==='volcano') return scatter(rng,g,Math.round(g.H/70),(x,y,r)=> r<0.6? rock(x,y,0.8+r,['#6a4030','#3f241b']) : `<line x1="${x.toFixed(0)}" y1="${y.toFixed(0)}" x2="${(x+14).toFixed(0)}" y2="${(y+18).toFixed(0)}" stroke="#ff5a2a" stroke-width="3" opacity=".7"/>`) + scatter(rng,g,Math.round(g.H/200),(x,y,r)=>dot(x,y,2,'#ffb03c'));
  if(rid==='star') return scatter(rng,g,Math.round(g.H/26),(x,y,r)=>star4(x,y,0.5+r*1.1, r<0.3?'#ffe36b':'#ffffff')) + scatter(rng,g,Math.round(g.H/500),(x,y,r)=>`<circle cx="${x.toFixed(0)}" cy="${y.toFixed(0)}" r="${(12+r*16).toFixed(0)}" fill="${['#7a8cf0','#f06ca8','#5fd6d0'][Math.floor(r*3)%3]}" opacity=".55"/>`);
  return scatter(rng,g,Math.round(g.H/90),(x,y,r)=>`<g transform="translate(${x.toFixed(0)} ${y.toFixed(0)})"><ellipse cx="0" cy="0" rx="${(20+r*16).toFixed(0)}" ry="${(12+r*8).toFixed(0)}" fill="#ffffff" opacity=".7"/></g>`) + scatter(rng,g,Math.round(g.H/60),(x,y,r)=>star4(x,y,0.4+r*0.7,['#ff8fb0','#ffe14a','#8fd4f0'][Math.floor(r*3)%3]));
}
function decorFront(rid,rng,g){
  let s='';
  const edgePine=(side)=>{ for(let i=0;i<Math.round(g.H/300);i++){ const y=rng()*g.H, x= side<0? 18+rng()*80 : g.W-18-rng()*80; s+= (rid==='forest')? pine(x,y,1.1+rng()*0.5,['#2f7028','#24551f']) : (rid==='sea'||rid==='volcano')? rock(x,y,1.2+rng()*0.6, rid==='sea'?['#7a8ea0','#556777']:['#5a3226','#331a14']) : ''; } };
  edgePine(-1); edgePine(1);
  if(rid==='forest'){ [0.34,0.68].forEach(t=>{ const a=g.pt(t), b=g.pt(t+0.008), ang=Math.atan2(b.y-a.y,b.x-a.x)*180/Math.PI; s+=bridge(a.x,a.y,ang); }); s+=`<path d="M-10,${(g.H*0.18).toFixed(0)} q90,50 40,130 q-60,100 40,180" stroke="#5cc8f0" stroke-width="22" fill="none" opacity=".8" stroke-linecap="round"/>`; }
  if(rid==='sea'){ [0.4,0.72].forEach(t=>{ const a=g.pt(t), b=g.pt(t+0.008), ang=Math.atan2(b.y-a.y,b.x-a.x)*180/Math.PI; s+=bridge(a.x,a.y,ang); }); }
  return s;
}
function buildScene(rid,list,p){
  const n=list.length, g=sceneGeom(n), th=THEME[rid], rng=mulberry32(hashStr(rid));
  const tA=0.03,tB=0.97, pts=[];
  for(let i=0;i<n;i++) pts.push(g.pt(tA+(tB-tA)*(n>1?i/(n-1):0)));
  let d=''; const K=Math.max(70,n*8);
  for(let k=0;k<=K;k++){ const q=g.pt(k/K); d+=(k?'L':'M')+q.x.toFixed(1)+' '+q.y.toFixed(1)+' '; }
  let svg=`<svg class="bg" viewBox="0 0 ${g.W} ${g.H}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">`;
  svg+=`<defs><linearGradient id="grd_${rid}" x1="0" y1="0" x2="0" y2="1">`+th.ground.map((c,i)=>`<stop offset="${(i/(th.ground.length-1)).toFixed(2)}" stop-color="${c}"/>`).join('')+`</linearGradient></defs>`;
  svg+=`<rect width="${g.W}" height="${g.H}" fill="url(#grd_${rid})"/>`;
  svg+=decorBack(rid,rng,g);
  svg+=`<path d="${d}" fill="none" stroke="rgba(0,0,0,.18)" stroke-width="54" stroke-linecap="round" stroke-linejoin="round"/>`;
  svg+=`<path d="${d}" fill="none" stroke="${th.path[1]}" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>`;
  svg+=`<path d="${d}" fill="none" stroke="${th.path[0]}" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>`;
  svg+=`<path d="${d}" fill="none" stroke="rgba(255,255,255,.22)" stroke-width="7" stroke-linecap="round" stroke-dasharray="1 30"/>`;
  svg+=decorFront(rid,rng,g);
  svg+=woodSign(clamp(pts[0].x,150,850), pts[0].y+92, 'START', 148);
  svg+=goalMarker(rid, clamp(pts[n-1].x,150,850), pts[n-1].y-118);
  svg+=`</svg>`;
  let pins='';
  list.forEach((sp,i)=>{
    const status=i<p?'done':(i===p?'current':'locked'), P=pts[i];
    const L=(P.x/g.W*100).toFixed(2), T=(P.y/g.H*100).toFixed(2);
    const disc = status==='done' ? monsterSVG(sp) : `<span class="qm">${sp.boss?'👑':'?'}</span>`;
    pins+=`<button class="pin ${status}${sp.boss?' boss':''}" data-i="${i}" style="left:${L}%;top:${T}%">`
      +(status==='current'?`<div class="flag">${sp.boss?'보스!':'여기!'}</div>`:'')
      +`<div class="disc">${disc}</div><div class="plaque">${sp.boss?'★':(i+1)}</div>`
      +(status==='done'?`<div class="chk">✓</div>`:'')+`</button>`;
  });
  return `<div class="scene" style="aspect-ratio:${g.W}/${g.H}">${svg}${pins}</div>`;
}
function renderJourney(){
  const r=REGIONS.find(x=>x.id===curRegion), list=speciesOf(curRegion), p=prog(curRegion);
  const got=list.filter(s=>state.caught[s.id]).length;
  $('jTitle').textContent=`${r.emoji} ${r.name}`;
  $('jProg').textContent=`${got} / ${list.length} 마리`;
  $('trailwrap').className='trailwrap';
  const trail=$('trail'); trail.innerHTML=buildScene(curRegion,list,p);
  const cur=trail.querySelector('.pin.current');
  if(cur) cur.onclick=()=>{ sndTap(); startEncounter(curRegion, +cur.dataset.i); };
  requestAnimationFrame(()=>{ if(cur) cur.scrollIntoView({block:'center'}); });
}

/* ================= BATTLE ================= */
let enc=null;
function startEncounter(rid,index){
  const sp=speciesOf(rid)[index];
  enc={ rid, index, sp, needed: sp.boss?3:1, got:0, noWrong:true };
  $('stage').className='battle-stage '+REGIONS.find(r=>r.id===rid).trail;
  $('battleMonster').className='battle-monster'+(sp.boss?' boss':'');
  $('battleMonster').innerHTML=monsterSVG(sp);
  show('battle');
  loadQuestion(true);
}
function renderHP(){ const h=$('hp'); if(enc.needed<=1){ h.textContent=''; return; } h.textContent='❤️'.repeat(enc.needed-enc.got)+'🖤'.repeat(enc.got); }
function loadQuestion(first){
  const q=makeQuestion(enc.rid); enc.q=q; answered=false; renderHP();
  $('qText').textContent=q.text; $('qVisual').innerHTML=q.visual||''; $('qHint').textContent=q.hint||'';
  $('feedback').textContent= first ? (enc.sp.boss?`보스 ${enc.sp.name} 등장! 실수 없이 3번 연속 맞혀야 잡아!`:`야생 ${enc.sp.name}(이)가 나타났다!`) : pick(['좋아! 다음 문제!','계속 가자!','한 문제 더!']);
  const wrap=$('choices'); wrap.className='choices'+(q.twoOpt?' two':''); wrap.innerHTML='';
  q.choices.forEach(c=>{ const b=document.createElement('button'); b.className='choice'; b.textContent=c; b.onclick=()=>answer(b,c); wrap.appendChild(b); });
  startTimer(TIME[q.type]||12);
}
function answer(btn,val){
  if(answered) return;
  ensureAudio();
  if(val===enc.q.answer){
    answered=true; stopTimer();
    btn.classList.add('right'); document.querySelectorAll('.choice').forEach(b=>b.onclick=null);
    sndCorrect(); enc.got++; renderHP();
    if(enc.got>=enc.needed){ $('feedback').textContent='정답이야! 🎉'; setTimeout(doCatch,600); }
    else { $('feedback').textContent='정답! 다음 문제야 💪'; setTimeout(()=>loadQuestion(false),750); }
  } else {
    failEncounter('wrong', btn);
  }
}
function failEncounter(reason, btn){
  if(answered) return;
  answered=true; stopTimer(); sndWrong();
  document.querySelectorAll('.choice').forEach(b=>{ b.onclick=null; if(String(b.textContent)===String(enc.q.answer)) b.classList.add('right'); });
  if(btn) btn.classList.add('wrong');
  $('battleMonster').classList.add('flee');
  $('feedback').textContent = reason==='time' ? '시간 초과! 몬스터가 도망쳤어요 🏃💨' : '아쉬워! 몬스터가 도망쳤어요 🏃💨';
  setTimeout(()=>{ $('battleMonster').classList.remove('flee'); renderJourney(); show('journey'); }, 1600);
}
function doCatch(){
  const sp=enc.sp, already=!!state.caught[sp.id];
  state.caught[sp.id]=(state.caught[sp.id]||0)+1;
  if(enc.noWrong) state.stars += sp.boss?3:1;
  state.progress[enc.rid]=Math.max(prog(enc.rid),enc.index+1);
  const list=speciesOf(enc.rid); const justCleared = state.progress[enc.rid]>=list.length && !state.cleared[enc.rid];
  if(state.progress[enc.rid]>=list.length) state.cleared[enc.rid]=true;
  save(); refreshBar();

  const wrap=$('catchWrap');
  wrap.innerHTML=`<div class="catch-monster" id="catchMon">${monsterSVG(sp)}</div><div class="ball" id="catchBall" style="opacity:0">${ballSVG()}</div>`;
  $('catchTitle').textContent=sp.boss?'보스를 잡았다!':'잡았다!';
  $('catchSub').textContent=already?`${sp.name} +1`:`새로운 몬스터! ${sp.name}`;
  $('catchOverlay').classList.add('show'); sndCatch();
  const mon=$('catchMon'),ball=$('catchBall');
  mon.animate([{transform:'scale(1)',opacity:1},{transform:'scale(.2)',opacity:0}],{duration:400,fill:'forwards',easing:'ease-in'});
  setTimeout(()=>{ ball.style.opacity='1'; ball.animate([{transform:'translate(-50%,-50%) scale(.4)'},{transform:'translate(-50%,-50%) scale(1)'}],{duration:250,easing:'cubic-bezier(.2,1.4,.4,1)'});
    setTimeout(()=>{ ball.animate([{transform:'translate(-50%,-50%) rotate(-14deg)'},{transform:'translate(-50%,-50%) rotate(14deg)'},{transform:'translate(-50%,-50%) rotate(0)'}],{duration:600,iterations:2}); sparkles(wrap); },260);
  },380);
  setTimeout(()=>{ $('catchOverlay').classList.remove('show'); if(justCleared){ finishRegion(enc.rid); } else { renderJourney(); show('journey'); } },2050);
}
function sparkles(host){ ['✨','⭐','💫','✨'].forEach((s,i)=>{ const el=document.createElement('div'); el.className='sparkle'; el.textContent=s; el.style.left=(20+i*22)+'%'; el.style.top=(20+(i%2)*40)+'%'; el.style.animationDelay=(i*0.12)+'s'; host.appendChild(el); setTimeout(()=>el.remove(),1000); }); }
function finishRegion(rid){
  const i=REGIONS.findIndex(r=>r.id===rid), next=REGIONS[i+1], list=speciesOf(rid);
  const gotAll=list.every(s=>state.caught[s.id]);
  $('clearEmoji').textContent=REGIONS[i].emoji;
  $('clearSub').textContent = next ? `길 끝의 보스를 물리쳤어! ${next.name}(이)가 열렸어 🔓` : '마지막 지역까지 완료! 진정한 몬스터 마스터야 🏆';
  $('clearOverlay').classList.add('show'); sndCatch(); confetti();
}
function confetti(){ const cs=['#ffd23f','#ff6b9d','#4fd1a5','#8a6cf0','#54b8f5']; for(let i=0;i<44;i++){ const c=document.createElement('div'); c.className='confetti'; c.style.left=Math.random()*100+'vw'; c.style.background=pick(cs); document.body.appendChild(c); const d=1400+Math.random()*1400; c.animate([{transform:'translateY(0) rotate(0)',opacity:1},{transform:`translateY(105vh) rotate(${Math.random()*720}deg)`,opacity:.9}],{duration:d,easing:'ease-in'}); setTimeout(()=>c.remove(),d); } }

/* ================= DEX ================= */
function renderDex(){
  const body=$('dexBody'); body.innerHTML='';
  REGIONS.forEach(r=>{
    const h=document.createElement('div'); h.className='dexregion'; h.textContent=`${r.emoji} ${r.name}`; body.appendChild(h);
    const grid=document.createElement('div'); grid.className='dexgrid';
    speciesOf(r.id).forEach(sp=>{ const got=state.caught[sp.id]; const card=document.createElement('div'); card.className='dexcard';
      card.innerHTML=monsterSVG(sp,{silhouette:!got})+`<div class="dexname${got?(sp.boss?' boss':''):' locked'}">${got?(sp.name+(sp.boss?' 👑':'')):'???'}</div>`; grid.appendChild(card); });
    body.appendChild(grid);
  });
}

/* ================= events ================= */
$('startBtn').onclick=()=>{ ensureAudio(); sndTap(); renderMap(); show('map'); };
$('dexBtn').onclick=()=>{ ensureAudio(); sndTap(); renderDex(); show('dex'); };
$('homeBtn').onclick=()=>{ sndTap(); show('title'); };
$('jBack').onclick=()=>{ sndTap(); renderMap(); show('map'); };
$('bBack').onclick=()=>{ stopTimer(); answered=true; $('battleMonster').classList.remove('flee'); sndTap(); renderJourney(); show('journey'); };
$('clearNext').onclick=()=>{ $('clearOverlay').classList.remove('show'); renderMap(); show('map'); };
$('muteBtn').onclick=()=>{ muted=!muted; $('muteBtn').textContent=muted?'🔇':'🔊'; if(!muted){ ensureAudio(); sndTap(); } };

/* ================= init ================= */
(function(){ for(let i=0;i<14;i++){ const s=document.createElement('div'); s.className='bg-star'; s.textContent='✦'; s.style.left=Math.random()*100+'vw'; s.style.top=Math.random()*100+'vh'; s.style.fontSize=(8+Math.random()*14)+'px'; s.style.animationDelay=(Math.random()*3)+'s'; document.body.appendChild(s); } })();
$('titleMonster').innerHTML=monsterSVG(pick(SPECIES.filter(s=>!s.boss)));
refreshBar();
</script>
