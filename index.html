}

const shuffle = a => { a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; };
const lessons = [...new Set(VOCAB.map(d=>d[0]))].sort((x,y)=>x-y);
function itemsFor(lesson){ const src = S.category==='vocab'?VOCAB:CHUNK; return src.filter(d=> lesson==='all' || d[0]===lesson); }

let AC=null;
function beep(ok){
  try{ AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(), g=AC.createGain(); o.connect(g); g.connect(AC.destination);
    o.frequency.value=ok?660:170; o.type=ok?'sine':'square';
    g.gain.setValueAtTime(.12,AC.currentTime); g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.25);
    o.start(); o.stop(AC.currentTime+.25);
    if(ok){ const o2=AC.createOscillator(),g2=AC.createGain(); o2.connect(g2); g2.connect(AC.destination);
      o2.frequency.setValueAtTime(660,AC.currentTime); o2.frequency.setValueAtTime(880,AC.currentTime+.08);
      g2.gain.setValueAtTime(.1,AC.currentTime); g2.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.25);
      o2.start(); o2.stop(AC.currentTime+.25); }
  }catch(e){}
}
function popEmoji(x,y,e){ const s=document.createElement('div'); s.className='pop'; s.textContent=e; s.style.left=x+'px'; s.style.top=y+'px'; document.body.appendChild(s); setTimeout(()=>s.remove(),800); }
function floatText(el,txt,cls){ if(!el)return; const r=el.getBoundingClientRect(); const s=document.createElement('div'); s.className='dmg '+(cls||''); s.textContent=txt; s.style.left=(r.left+r.width/2)+'px'; s.style.top=(r.top+18)+'px'; document.body.appendChild(s); setTimeout(()=>s.remove(),700); }
let VOICES=[];
function loadVoices(){ try{ VOICES=speechSynthesis.getVoices()||[]; }catch(e){} }
if('speechSynthesis' in window){ loadVoices(); try{ speechSynthesis.onvoiceschanged=loadVoices; }catch(e){} }
function speak(text){
  try{
    if(!('speechSynthesis' in window)||!text) return;
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.9;
    const v=VOICES.find(x=>/^en/i.test(x.lang)); if(v) u.voice=v;
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ===== PASS / QUEST storage (localStorage = 이 기기에 영구 저장) ===== */
const QUESTS = {};
function qKey(l,c){ return 'q:b2:'+l+':'+c; }
function getQ(l,c){ return QUESTS[qKey(l,c)] || {}; }
function isPass(l,c){ const o=getQ(l,c); return !!(o.flash&&o.match&&o.type&&o.battle); }
async function storeGet(key){ try{ const v=localStorage.getItem(key); return v? JSON.parse(v):null; }catch(e){ return null; } }
async function storeSet(key,v){ try{ localStorage.setItem(key, JSON.stringify(v)); }catch(e){} }
async function storeDel(key){ try{ localStorage.removeItem(key); }catch(e){} }
async function loadAll(){
  const jobs=[];
  for(const l of lessons) for(const c of ['vocab','chunk']){ const k=qKey(l,c);
    jobs.push(storeGet(k).then(v=>{ QUESTS[k]= (v&&typeof v==='object')? v : {}; })); }
  try{ await Promise.all(jobs); }catch(e){}
}
async function markQuest(l,c,quest){
  if(l==='all') return {marked:false,newlyPassed:false};
  const k=qKey(l,c); const o=QUESTS[k]||(QUESTS[k]={});
  const before=isPass(l,c); o[quest]=true; QUESTS[k]=o; await storeSet(k,o);
  return {marked:true, newlyPassed:isPass(l,c)&&!before};
}
async function resetLesson(l){ for(const c of ['vocab','chunk']){ const k=qKey(l,c); QUESTS[k]={}; await storeDel(k); } }
async function resetAll(){ for(const l of lessons) await resetLesson(l); }

function renderBattle(hero,enemy){
  const pool=itemsFor(S.lesson);
  const mp=matchup(hero.el, enemy.el);
  // 상성/등급이 나쁠수록 한↔영 반대 방향 문제를 더 많이 추가한다 (화면엔 표시 안 함)
  const matchupLevel = mp.cls==='good' ? -1 : mp.cls==='bad' ? 1 : 0;
  const tierLevel = {S:-2,A:-1,B:0,C:1,D:2}[hero.tier];
  const hc = Math.max(0, Math.min(4, matchupLevel + tierLevel));
  const nExtra = Math.round(pool.length * (hc/4));
  const base = shuffle(pool).map(it=>({it,rev:false}));                  // 카드 단어 전부: 영어→뜻
  const extra = shuffle(pool).slice(0,nExtra).map(it=>({it,rev:true}));  // 불리할수록 한↔영 반대 추가
  const queue = shuffle(base.concat(extra));
  const total = queue.length;
  let correctCount=0, hearts=5, combo=0, busy=false, curCorrect=null;
  function draw(){
    const cur=queue[0], c=qa(cur.it), rev=cur.rev;
    const promptText = rev ? c.a : c.q;
    curCorrect = rev ? c.q : c.a;
    const field = rev ? (x=>qa(x).q) : (x=>qa(x).a);
    const opts=shuffle([curCorrect,...shuffle([...new Set(pool.map(field))].filter(x=>x!==curCorrect)).slice(0,3)]);
    const qtag = rev ? '🔄 뜻을 보고 영어를 골라 공격!' : (S.category==='vocab'?'영어 단어의 뜻을 골라 공격!':'청크의 뜻을 골라 공격!');
    app.innerHTML = `
      ${hud('단어 배틀 ⚔️', combo>=2?('🔥 x'+combo):'')}
      <div class="arena">
        <div class="fighter enemy" id="enemyF"><div class="fname">${enemy.name}</div><div class="emo">${enemy.emo}</div><div class="hpbar"><div id="enemyHP" style="width:${(total-correctCount)/total*100}%"></div></div></div>
        <div class="vs">⚔️ VS ⚔️</div>
        <div class="fighter hero" id="heroF"><div class="emo"><img src="${hero.img}" alt="" style="width:72px;height:72px;object-fit:contain"></div><div class="hearts" id="hearts">${'❤️'.repeat(hearts)}${'🤍'.repeat(5-hearts)}</div></div>
      </div>
      <div class="qcard battle-q"><div class="qtag">${qtag}</div><div class="qword">${promptText}</div></div>
      <div class="opts" id="opts">${opts.map(o=>`<button class="opt" data-a="${encodeURIComponent(o)}">${o}</button>`).join('')}</div>`;
    bindBack();
    document.getElementById('opts').onclick=onAnswer;
  }
  function onAnswer(e){
    if(busy)return; const b=e.target.closest('.opt'); if(!b)return;
    const ok=decodeURIComponent(b.dataset.a)===curCorrect; busy=true;
    document.querySelectorAll('.opt').forEach(el=>{const a=decodeURIComponent(el.dataset.a); if(a===curCorrect)el.classList.add('correct'); else if(el===b&&!ok)el.classList.add('wrong'); else el.classList.add('dim');});
    const enemyF=document.getElementById('enemyF'), heroF=document.getElementById('heroF');
    if(ok){
      combo++; correctCount++; queue.shift(); beep(true);
      heroF.classList.add('attack-up'); setTimeout(()=>heroF.classList.remove('attack-up'),300);
      enemyF.classList.add('hit'); setTimeout(()=>enemyF.classList.remove('hit'),300);
      const bar=document.getElementById('enemyHP'); if(bar) bar.style.width=((total-correctCount)/total*100)+'%';
      setTimeout(()=>{ if(queue.length===0) win(); else { busy=false; draw(); } },600);
    } else {
      combo=0; hearts--; queue.push(queue.shift()); beep(false);   // 틀리면 뒤로 보내 다시 출제
      enemyF.classList.add('attack-down'); setTimeout(()=>enemyF.classList.remove('attack-down'),300);
      heroF.classList.add('hit'); setTimeout(()=>heroF.classList.remove('hit'),300);
      floatText(heroF,'💥',''); const hh=Math.max(hearts,0); const h=document.getElementById('hearts'); if(h) h.textContent='❤️'.repeat(hh)+'🤍'.repeat(5-hh);
      setTimeout(()=>{ if(hearts<=0) lose(); else { busy=false; draw(); } },850);
    }
  }
  async function win(){
    let marked=false, pass=false;
    if(S.lesson!=='all'){ const r=await markQuest(S.lesson,S.category,'battle'); marked=true; pass=r.newlyPassed; }
    app.innerHTML = `
      <div class="topbar"><div class="logo">⚔️ 승리!</div></div>
      <div class="result">
        <div class="emo">🏆</div><div class="score">${enemy.emo} 처치!</div>
        <div class="msg">승리예요! 🎉</div>
        ${marked?`<div class="best">⚔️ 이 레슨 배틀 통과!</div>`:''}
        ${pass?`<div class="best on">🎉 Lesson ${S.lesson} ${catLabel()} PASS!</div>`:''}
        <div class="acts"><button class="home" id="rHome">홈으로</button><button class="again" id="rAgain">다시 배틀 ↻</button></div>
      </div>`;
    document.getElementById('rHome').onclick=renderHome; document.getElementById('rAgain').onclick=renderBattleIntro;
  }
  function lose(){
    app.innerHTML = `
      <div class="topbar"><div class="logo">⚔️ 패배…</div></div>
      <div class="result">
        <div class="emo">😵</div><div class="score">아쉽다!</div>
        <div class="msg">조금만 더 연습하면 이길 수 있어요 💪</div>
        <div class="acts"><button class="home" id="rHome">홈으로</button><button class="again" id="rAgain">다시 도전 ↻</button></div>
      </div>`;
    document.getElementById('rHome').onclick=renderHome; document.getElementById('rAgain').onclick=renderBattleIntro;
  }
  draw();
}

function renderType(){
  replay=renderType;
  const pool=itemsFor(S.lesson); const items=shuffle(pool).slice(0,S.lesson==='all'?20:pool.length);
  const total=items.length;
  let queue=items.slice(), i=0, phase='main', wrong=[], firstScore=0, combo=0, answered=false;
  const norm=s=>(s||'').toLowerCase().replace(/[.?!,]+$/,'').replace(/\s+/g,' ').trim();
  const masked=ans=>ans.split(' ').map(w=>w[0]+(w.length>1?'_'.repeat(w.length-1):'')).join('  ');
  function retryIntro(){
    phase='retry'; queue=shuffle(wrong.slice()); i=0;
    app.innerHTML = `
      ${hud('써보기 ⌨️','🔁 재도전')}
      <div class="qcard"><div style="font-size:48px">🔁</div>
        <div class="qword" style="font-size:22px;margin-top:6px">아쉽게 틀린 단어 ${queue.length}개!</div>
        <div class="qtag" style="margin-top:10px;font-size:13px">한 번 더 기회를 줄게요. 이번에 다 맞히면 통과예요!</div></div>
      <button class="startbtn" id="retryGo">다시 도전 🔁</button>`;
    bindBack();
    document.getElementById('retryGo').onclick=()=>{ beep(true); draw(); };
  }
  function draw(){
    const it=queue[i], c=qa(it); answered=false;
    const counter = phase==='main' ? ((i+1)+' / '+total) : ('🔁 '+(i+1)+' / '+queue.length);
    const tag = phase==='main' ? (S.category==='vocab'?'뜻을 보고 영어 단어를 쓰세요 ✍️':'뜻을 보고 영어 청크를 쓰세요 ✍️') : '🔁 틀린 단어 다시! 영어로 써보세요';
    app.innerHTML = `
      ${hud('써보기 ⌨️', counter)}
      <div class="progress"><div style="width:${(i/queue.length)*100}%"></div></div>
      <div class="combo">${phase==='main'&&combo>=2?('🔥 '+combo+' 연속!'):''}</div>
      <div class="qcard"><div class="qtag">${tag}</div>
        <div class="qword" style="font-size:24px">${c.a}</div>
        <div id="hintLine" style="margin-top:14px;font-size:18px;letter-spacing:2px;color:#9bbcae;font-weight:800;display:none">${masked(c.q)}</div></div>
      <input id="typeIn" class="type-in" type="text" autocapitalize="off" autocorrect="off" autocomplete="off" spellcheck="false" placeholder="여기에 영어로 입력">
      <div id="feedback" class="type-fb"></div>
      <div class="flash-ctrl"><button class="fbtn dunno" id="hintBtn">힌트 💡</button><button class="fbtn know" id="checkBtn">확인 ✓</button></div>`;
    bindBack();
    const input=document.getElementById('typeIn'); setTimeout(()=>{ try{input.focus();}catch(e){} },50);
    document.getElementById('hintBtn').onclick=()=>{ document.getElementById('hintLine').style.display='block'; };
    const advance=()=>{ i++; if(i>=queue.length){ if(phase==='main'&&wrong.length>0) retryIntro(); else fin(); } else draw(); };
    const check=(ev)=>{
      if(answered){ advance(); return; }
      const val=norm(input.value); if(!val)return; answered=true;
      const ok=val===norm(c.q); const fb=document.getElementById('feedback');
      if(ok){ beep(true); if(ev) popEmoji(ev.clientX||200,ev.clientY||300,'🎯'); fb.innerHTML='🎉 정답!'; fb.className='type-fb good';
        if(phase==='main'){ firstScore++; combo++; } else { const idx=wrong.indexOf(it); if(idx>=0) wrong.splice(idx,1); } }
      else { beep(false); combo=0; fb.innerHTML='정답: <b>'+c.q+'</b>'; fb.className='type-fb bad'; if(phase==='main') wrong.push(it); }
      input.disabled=true; document.getElementById('hintBtn').disabled=true;
      const last=i>=queue.length-1;
      document.getElementById('checkBtn').textContent = last ? (phase==='main'&&wrong.length>0?'재도전 ▶':'결과 보기') : '다음 ▶';
    };
    document.getElementById('checkBtn').onclick=check;
    input.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); check(); } });
  }
  async function fin(){
    const finalWrong=wrong.length; const perfect=finalWrong===0; const score=total-finalWrong; let qi=null;
    if(S.lesson!=='all'){ if(perfect){ const r=await markQuest(S.lesson,S.category,'type'); qi={quest:'써보기',ok:true,pass:r.newlyPassed}; } else qi={quest:'써보기',ok:false,note:'틀린 단어를 재도전에서도 다 맞히면 통과돼요'}; }
    const emoji = perfect ? (firstScore===total?'🏆':'🎉') : '💪';
    renderResult({score,total,mode:'type',emoji,noBest:true,questInfo:qi,custom:(perfect&&firstScore<total)?'🔁 재도전으로 통과!':''});
  }
  draw();
}

function renderMatch(){
  replay=renderMatch;
  const picked=shuffle(itemsFor(S.lesson)).slice(0,6);
  const left=shuffle(picked.map(it=>({q:qa(it).q, a:qa(it).a})));
  const right=shuffle(picked.map(it=>({a:qa(it).a})));
  let sel=null,matched=0,mistakes=0,t0=Date.now();
  app.innerHTML=`${hud('짝 맞추기 🧩','0 / 6')}<div class="match-grid" id="grid"></div>`;
  bindBack();
  const grid=document.getElementById('grid');
  grid.innerHTML=left.map((x,k)=>`<div class="mcard" data-side="L" data-ans="${encodeURIComponent(x.a)}">${x.q}</div><div class="mcard" data-side="R" data-val="${encodeURIComponent(right[k].a)}">${right[k].a}</div>`).join('');
  grid.onclick=(e)=>{
    const card=e.target.closest('.mcard'); if(!card||card.classList.contains('done'))return;
    if(!sel){ sel=card; card.classList.add('sel'); return; }
    if(sel===card){ card.classList.remove('sel'); sel=null; return; }
    if(sel.dataset.side===card.dataset.side){ sel.classList.remove('sel'); sel=card; card.classList.add('sel'); return; }
    const L=sel.dataset.side==='L'?sel:card, R=sel.dataset.side==='L'?card:sel;
    if(decodeURIComponent(L.dataset.ans)===decodeURIComponent(R.dataset.val)){ sel.classList.remove('sel'); sel.classList.add('done'); card.classList.add('done'); matched++; beep(true); popEmoji(e.clientX,e.clientY,'🔗'); document.querySelectorAll('.meta')[1].textContent=matched+' / 6'; sel=null; if(matched===6) fin(); }
    else { mistakes++; beep(false); const a=sel,b=card; a.classList.add('bad'); b.classList.add('bad'); setTimeout(()=>{a.classList.remove('bad','sel'); b.classList.remove('bad');},350); sel=null; }
  };
  async function fin(){
    const secs=Math.round((Date.now()-t0)/1000); const perfect=mistakes===0; let qi=null;
    if(S.lesson!=='all'){ if(perfect){ const r=await markQuest(S.lesson,S.category,'match'); qi={quest:'짝맞추기',ok:true,pass:r.newlyPassed}; } else qi={quest:'짝맞추기',ok:false,note:'틀리지 않고 맞히면 통과돼요'}; }
    renderResult({score:6-Math.min(mistakes,6),total:6,mode:'match',emoji:perfect?'🏆':'🎉',noBest:true,custom:`⏱️ ${secs}초 · 틀린 횟수 ${mistakes}번`,questInfo:qi});
  }
}

function renderResult(o){
  const pct=o.score/o.total;
  const msg = o.mode==='flash' ? '잘했어요! 반복하면 더 잘 외워져요 🌱'
    : o.mode==='match' ? (o.custom||'')
    : pct===1?'완벽해요! 천재 등장 🏆': pct>=0.8?'아주 잘했어요! 👍': pct>=0.5?'좋아요, 한 번 더 도전!':'괜찮아요, 다시 하면 늘어요 💪';
  let qline='';
  if(o.questInfo){ const qi=o.questInfo;
    if(qi.ok){ qline = qi.pass ? `<div class="best on">🎉 Lesson ${S.lesson} ${catLabel()} PASS!</div>` : `<div class="best">✅ 이 레슨 ${qi.quest} 통과!</div>`; }
    else { qline = `<div class="best">${qi.note||'만점일 때 통과돼요'}</div>`; }
  }
  app.innerHTML=`
    <div class="topbar"><div class="logo">🌱 결과</div></div>
    <div class="result">
      <div class="emo">${o.emoji}</div>
      <div class="score">${o.score} / ${o.total}</div>
      <div class="msg">${msg}</div>
      ${o.custom && o.mode!=='match'?`<div class="best">${o.custom}</div>`:''}
      ${qline}
      <div class="acts"><button class="home" id="rHome">홈으로</button><button class="again" id="rAgain">한 번 더 ↻</button></div>
    </div>`;
  document.getElementById('rHome').onclick=renderHome;
  document.getElementById('rAgain').onclick=()=>{ if(replay) replay(); else renderHome(); };
}

renderHome();
loadAll().then(renderHome);
</script>
