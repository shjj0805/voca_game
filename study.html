<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>공부 놀이터 · 과목 선택</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="공부 놀이터">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#5b3fb0">
<style>
  :root{
    --ink:#2b2350;
    --font:"Pretendard","Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",system-ui,sans-serif;
    --shadow:0 8px 0 rgba(43,35,80,.18);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    font-family:var(--font); color:var(--ink);
    background:
      radial-gradient(circle at 18% 10%, rgba(255,255,255,.30), transparent 40%),
      radial-gradient(circle at 85% 6%, rgba(255,210,63,.28), transparent 38%),
      linear-gradient(160deg,#8a6cf0,#5b3fb0);
    background-attachment:fixed; min-height:100dvh; overflow-x:hidden; user-select:none;
    display:flex; align-items:center; justify-content:center; padding:24px 16px;
  }
  .bg-star{ position:fixed; color:rgba(255,255,255,.5); pointer-events:none; z-index:0; animation:tw 3s ease-in-out infinite; }
  @keyframes tw{ 0%,100%{opacity:.25;transform:scale(.8);} 50%{opacity:.9;transform:scale(1.15);} }

  .wrap{ position:relative; z-index:1; width:100%; max-width:560px; text-align:center; }

  .logo{
    font-size:clamp(34px,10vw,52px); font-weight:900; line-height:1.05; letter-spacing:-1px; color:#fff;
    text-shadow:0 5px 0 #3a2a8a,0 6px 14px rgba(0,0,0,.25);
  }
  .logo .hl{ color:#ffd23f; display:inline-block; transform:rotate(-4deg); }
  .subtitle{ color:#fff; font-weight:800; font-size:16px; opacity:.95; margin-top:10px; }

  .cards{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:28px; }
  @media (max-width:460px){ .cards{ grid-template-columns:1fr; } }

  .subject{
    position:relative; border:none; cursor:pointer; font-family:var(--font);
    border-radius:26px; padding:24px 14px 20px; color:#fff; overflow:hidden;
    box-shadow:0 10px 0 rgba(0,0,0,.18),0 14px 22px rgba(0,0,0,.2);
    transition:transform .1s,box-shadow .1s; min-height:196px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    animation:pop .4s cubic-bezier(.2,1.3,.5,1) both;
  }
  .subject:active{ transform:translateY(6px); box-shadow:0 4px 0 rgba(0,0,0,.18),0 8px 12px rgba(0,0,0,.2); }
  .subject:nth-child(2){ animation-delay:.08s; }
  .subject:nth-child(3){ animation-delay:.16s; }
  @keyframes pop{ from{opacity:0;transform:scale(.9) translateY(14px);} to{opacity:1;transform:none;} }

  .subject .emoji{ font-size:58px; line-height:1; filter:drop-shadow(0 6px 6px rgba(0,0,0,.25)); animation:bob 2.6s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{transform:translateY(0) rotate(-2deg);} 50%{transform:translateY(-8px) rotate(2deg);} }
  .subject .sname{ font-size:24px; font-weight:900; text-shadow:0 2px 0 rgba(0,0,0,.2); }
  .subject .sdesc{ font-size:12.5px; font-weight:800; opacity:.95; line-height:1.35; }
  .subject .go{
    margin-top:6px; background:rgba(255,255,255,.92); color:var(--ink);
    font-weight:900; font-size:13.5px; padding:8px 14px; border-radius:999px; box-shadow:var(--shadow);
  }

  .s-korean{ background:linear-gradient(140deg,#ff9ec4,#ff5f8f); }
  .s-korean .go{ color:#c72e63; }
  .s-math{ background:linear-gradient(140deg,#6ce0b0,#28b483); }
  .s-math .go{ color:#1a8a63; }
  .s-brain{ background:linear-gradient(140deg,#a78bfa,#7d63f2); }
  .s-brain .go{ color:#5b3fc0; }

  .footer{ color:#fff; opacity:.8; font-weight:700; font-size:12px; margin-top:26px; }

  @media (prefers-reduced-motion: reduce){ *{ animation-duration:.001s !important; } }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">공부 <span class="hl">놀이터</span></div>
    <div class="subtitle">어떤 과목으로 놀아 볼까?</div>

    <div class="cards">
      <button class="subject s-korean" onclick="goTo('korean.html')">
        <span class="emoji">📖</span>
        <span class="sname">국어</span>
        <span class="sdesc">글 탐정단 · 읽고 추리하기</span>
        <span class="go">시작하기 ➜</span>
      </button>

      <button class="subject s-math" onclick="goTo('math.html')">
        <span class="emoji">🧮</span>
        <span class="sname">수학</span>
        <span class="sdesc">몬스터 수학 대모험</span>
        <span class="go">시작하기 ➜</span>
      </button>

      <button class="subject s-brain" onclick="goTo('brain.html')">
        <span class="emoji">🧠</span>
        <span class="sname">두뇌</span>
        <span class="sdesc">두뇌 탐험대 · 기억력·논리</span>
        <span class="go">시작하기 ➜</span>
      </button>
    </div>

    <div class="footer">과목을 골라 클릭하면 게임이 시작돼요</div>
  </div>

<script>
"use strict";
function goTo(url){ window.location.href = url; }
/* twinkling background stars */
(function(){
  for(let i=0;i<14;i++){
    const s=document.createElement('div'); s.className='bg-star'; s.textContent='✦';
    s.style.left=Math.random()*100+'vw'; s.style.top=Math.random()*100+'vh';
    s.style.fontSize=(8+Math.random()*14)+'px'; s.style.animationDelay=(Math.random()*3)+'s';
    document.body.appendChild(s);
  }
})();
</script>
</body>
</html>
